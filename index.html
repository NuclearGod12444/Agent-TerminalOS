<!DOCTYPE html>
<html>
<head>
    <title>TSCPP Advanced Terminal</title>
    <link rel="icon" type="image/png" href="TSCPP.png">
    <style>
        body { 
            background-color: #0a0a0a; color: #00ff41; 
            font-family: 'Courier New', Courier, monospace; 
            padding: 20px; margin: 0; height: 100vh; overflow: hidden;
            animation: flicker 0.15s infinite;
            box-shadow: inset 0 0 100px rgba(0, 255, 65, 0.1);
        }
        body::before {
            content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 10; background-size: 100% 4px, 3px 100%; pointer-events: none;
            animation: moveLines 12s linear infinite;
        }
        body::after {
            content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 0%, rgba(0, 255, 65, 0.04) 50%, rgba(18, 16, 16, 0) 100%);
            background-size: 100% 200px; z-index: 11; pointer-events: none;
            animation: moveBeam 8s linear infinite;
        }
        @keyframes moveLines { 0% { background-position: 0 0; } 100% { background-position: 0 100%; } }
        @keyframes moveBeam { 0% { background-position: 0 -200px; } 100% { background-position: 0 100vh; } }
        @keyframes flicker { 0% { opacity: 0.98; } 50% { opacity: 0.96; } 100% { opacity: 1.0; } }
        #header { border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; text-transform: uppercase; color: #444; position: relative; z-index: 5; }
        #output { height: calc(100vh - 150px); overflow-y: auto; padding: 10px; white-space: pre-wrap; text-shadow: 0 0 5px rgba(0, 255, 65, 0.7); position: relative; z-index: 5; }
        #input-line { display: flex; align-items: center; position: relative; z-index: 5; }
        input { background: transparent; border: none; color: #00ff41; font-family: inherit; font-size: inherit; outline: none; width: 100%; }
        .error { color: #ff5555; text-shadow: 0 0 8px #ff5555; }
        .system { color: #55aaff; text-shadow: 0 0 8px #55aaff; }
        .admin { color: #ffcc00; text-shadow: 0 0 8px #ffcc00; }
        .blinking { animation: threat-blink 1s infinite; }
        @keyframes threat-blink { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }
    </style>
</head>
<body onload="bootSequence()">
    <div id="header">
        <span>TSCPP Advanced Terminal</span>
        <span id="digital-clock">00:00:00</span>
        <span id="threat-level" class="error">LEVEL: RESTRICTED</span>
    </div>
    <div id="output"></div>
    <div id="input-line">
        <span id="prompt-text" style="margin-right: 10px;">AGENT@FBI:~$</span>
        <input type="text" id="cmd-input" autofocus autocomplete="off">
    </div>

    <script>
        const input = document.getElementById('cmd-input');
        const output = document.getElementById('output');
        const promptSpan = document.getElementById('prompt-text');
        const threatLevel = document.getElementById('threat-level');

        let isAdmin = false;
        let isWaitingForPassword = false;
        const SECRET_KEY = "Secret@Agent983"; 
        
        // This is your SECURE relay URL
        const GATEKEEPER = "https://eoospzeqxs4diuy.m.pipedream.net";

        let cmdHistory = [];
        let historyIndex = -1;

        let files = JSON.parse(localStorage.getItem('fbi_files')) || {
            "welcome.txt": "Standard access granted. ROOT login required for file export."
        };

        function saveFiles() { localStorage.setItem('fbi_files', JSON.stringify(files)); }

        async function relayToDiscord(text) {
            if (isWaitingForPassword) return; // Privacy Shield
            fetch(GATEKEEPER, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: text })
            }).catch(() => {});
        }

        async function typePrint(text, className = "", speed = 20) {
            const line = document.createElement('div');
            if (className) line.className = className;
            output.appendChild(line);
            for (let i = 0; i < text.length; i++) {
                line.innerHTML += text.charAt(i);
                output.scrollTop = output.scrollHeight;
                await new Promise(res => setTimeout(res, speed));
            }
        }

        async function bootSequence() {
            input.disabled = true;
            await typePrint(">> FBI CORE V4.2 INITIALIZING...", "system");
            await typePrint(">> SECURE RELAY UPLINK... ONLINE", "system");
            await typePrint("[!] SECURITY NOTICE: DO NOT INPUT SENSITIVE INFORMATION.", "error");
            await typePrint("WELCOME AGENT. TYPE 'HELP' FOR COMMANDS.");
            input.disabled = false;
            input.focus();
        }

        input.addEventListener('keydown', async function (e) {
            if (e.key === 'Enter') {
                const rawCmd = input.value;
                input.value = '';
                if (rawCmd.trim()) {
                    cmdHistory.push(rawCmd);
                    historyIndex = cmdHistory.length;
                    await processCommand(rawCmd);
                }
            } 
            else if (e.key === 'ArrowUp' && historyIndex > 0) { historyIndex--; input.value = cmdHistory[historyIndex]; }
            else if (e.key === 'ArrowDown' && historyIndex < cmdHistory.length - 1) { historyIndex++; input.value = cmdHistory[historyIndex]; }
        });

        async function processCommand(rawCmd) {
            const fullCmd = rawCmd.trim();
            const args = fullCmd.split(' ');
            const cmd = args[0].toLowerCase();

            if (isWaitingForPassword) {
                if (fullCmd === SECRET_KEY) {
                    isAdmin = true; isWaitingForPassword = false;
                    promptSpan.innerText = "ROOT@FBI:#"; promptSpan.className = "admin";
                    threatLevel.innerText = "LEVEL: UNRESTRICTED (ROOT)"; threatLevel.classList.add('blinking');
                    await typePrint("ACCESS GRANTED. ROOT TOOLS UNLOCKED.", "admin");
                } else {
                    isWaitingForPassword = false; await typePrint("AUTH_ERROR: ACCESS DENIED.", "error");
                }
                return;
            }

            relayToDiscord(`**[${isAdmin ? "ROOT" : "AGENT"}]**: \`${fullCmd}\``);

            const line = document.createElement('div');
            line.innerText = (isAdmin ? "ROOT@FBI:# " : "AGENT@FBI:~$ ") + fullCmd;
            output.appendChild(line);

            switch(cmd) {
                case 'help':
                    await typePrint("GENERAL: ls, cat [file], clear, login, status, msg [text], connect tscpp main");
                    if (isAdmin) await typePrint("ROOT TOOLS: write [file] [text], download [file], locate [target], logout", "admin");
                    break;
                case 'msg':
                    const msgText = args.slice(1).join(' ');
                    if (!msgText) await typePrint("USAGE: msg [text]", "error");
                    else {
                        await typePrint("ENCRYPTING PACKET...", "system");
                        relayToDiscord(`📩 **STAFF_MSG FROM ${isAdmin ? "ROOT" : "AGENT"}**: ${msgText}`);
                        await typePrint("TRANSMISSION SUCCESSFUL.", "admin");
                    }
                    break;
                case 'connect':
                    if (args[1] === 'tscpp' && args[2] === 'main') {
                        window.open("https://github.io", "_blank");
                        await typePrint("UPLINK ESTABLISHED.", "admin");
                    } else await typePrint("USAGE: connect tscpp main", "error");
                    break;
                case 'write':
                    if (!isAdmin) await typePrint("ERR: ROOT REQUIRED", "error");
                    else if (args.length < 3) await typePrint("USAGE: write [file] [text]", "error");
                    else { files[args[1]] = args.slice(2).join(' '); saveFiles(); await typePrint(`FILE '${args[1]}' SAVED.`, "admin"); }
                    break;
                case 'ls': await typePrint(Object.keys(files).join("   ") || "Empty."); break;
                case 'cat':
                    if (files[args[1]]) await typePrint(files[args[1]]);
                    else await typePrint("ERR: FILE NOT FOUND", "error");
                    break;
                case 'download':
                    if (!isAdmin) await typePrint("ERR: ROOT REQUIRED", "error");
                    else if (!files[args[1]]) await typePrint("ERR: FILE NOT FOUND", "error");
                    else {
                        const blob = new Blob([files[args[1]]], { type: 'text/plain' });
                        const url = window.URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url; a.download = args[1].endsWith('.txt') ? args[1] : args[1] + '.txt';
                        document.body.appendChild(a); a.click();
                        window.URL.revokeObjectURL(url); document.body.removeChild(a);
                        await typePrint(`SUCCESS: File '${args[1]}' exported.`, "admin");
                    }
                    break;
                case 'locate':
                    if (!isAdmin) await typePrint("ERR: ROOT REQUIRED", "error");
                    else {
                        await typePrint("TRIANGULATING...", "system");
                        await new Promise(r => setTimeout(r, 1000));
                        await typePrint(`COORDS: ${(Math.random()*180-90).toFixed(4)}, ${(Math.random()*360-180).toFixed(4)}`, "admin");
                    }
                    break;
                case 'login': isWaitingForPassword = true; await typePrint("ENTER ADMINISTRATIVE KEY:"); break;
                case 'logout':
                    isAdmin = false; promptSpan.innerText = "AGENT@FBI:~$"; promptSpan.className = "";
                    threatLevel.innerText = "LEVEL: RESTRICTED"; threatLevel.classList.remove('blinking');
                    await typePrint("SESSION TERMINATED."); break;
                case 'status':
                    await typePrint(`UPLINK: SECURE | AUTH: ${isAdmin ? "ROOT" : "AGENT"}`, "system");
                    break;
                case 'clear': output.innerHTML = ''; break;
                default: await typePrint(`ERR: '${cmd}' NOT RECOGNIZED`, "error");
            }
        }
        setInterval(() => { document.getElementById('digital-clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    </script>
</body>
</html>
