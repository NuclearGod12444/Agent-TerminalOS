<!DOCTYPE html>
<html>
<head>
    <title>TSCPP Advanced Terminal</title>
    <link rel="icon" type="image/png" href="TSCPP.png">
    <style>
        body { 
            background-color: #0a0a0a; 
            color: #00ff41; 
            font-family: 'Courier New', Courier, monospace; 
            padding: 20px; 
            margin: 0;
            height: 100vh;
            overflow: hidden;
            animation: flicker 0.15s infinite;
        }

        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 10;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            animation: moveLines 12s linear infinite;
        }

        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 0%, rgba(0, 255, 65, 0.03) 50%, rgba(18, 16, 16, 0) 100%);
            background-size: 100% 200px;
            z-index: 11;
            pointer-events: none;
            animation: moveBeam 8s linear infinite;
        }

        @keyframes moveLines { 0% { background-position: 0 0; } 100% { background-position: 0 100%; } }
        @keyframes moveBeam { 0% { background-position: 0 -200px; } 100% { background-position: 0 100vh; } }
        @keyframes flicker { 0% { opacity: 0.98; } 50% { opacity: 0.96; } 100% { opacity: 1.0; } }

        #header {
            border-bottom: 2px solid #333; 
            padding-bottom: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            text-transform: uppercase;
            color: #444; 
            position: relative; z-index: 5;
        }

        #digital-clock { color: #00ff41; text-shadow: 0 0 5px #00ff41; }

        #output { 
            height: calc(100vh - 150px); 
            overflow-y: auto; 
            padding: 10px; 
            white-space: pre-wrap;
            text-shadow: 0 0 5px rgba(0, 255, 65, 0.7); 
            position: relative; z-index: 5;
        }

        #input-line { display: flex; align-items: center; position: relative; z-index: 5; }
        input { background: transparent; border: none; color: #00ff41; font-family: inherit; font-size: inherit; outline: none; width: 100%; }

        .error { color: #ff5555; text-shadow: 0 0 8px #ff5555; }
        .system { color: #55aaff; text-shadow: 0 0 8px #55aaff; }
        .admin { color: #ffcc00; text-shadow: 0 0 8px #ffcc00; }
        @keyframes threat-blink { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }
        .blinking { animation: threat-blink 1s infinite; }
    </style>
</head>
<body onload="bootSequence()">

    <div id="header">
        <span>TSCPP Advanced Terminal</span>
        <span id="digital-clock">00:00:00</span>
        <span id="threat-level" class="error">LEVEL: RESTRICTED</span>
    </div>

    <div id="output"></div>

    <div id="input-line">
        <span id="prompt-text" style="margin-right: 10px;">AGENT@FBI:~$</span>
        <input type="text" id="cmd-input" autofocus autocomplete="off">
    </div>

    <script>
        const input = document.getElementById('cmd-input');
        const output = document.getElementById('output');
        const promptSpan = document.getElementById('prompt-text');
        const threatLevel = document.getElementById('threat-level');

        let isAdmin = false;
        let isWaitingForPassword = false;
        const SECRET_KEY = "Secret@Agent983"; 
        
        let cmdHistory = [];
        let historyIndex = -1;

        let files = JSON.parse(localStorage.getItem('fbi_files')) || {
            "welcome.txt": "Standard agent access granted. Use 'login' for high-clearance tools.",
            "protocol_1.txt": "In case of terminal compromise, type 'logout' immediately."
        };

        function saveFiles() { localStorage.setItem('fbi_files', JSON.stringify(files)); }

        function updateClock() {
            const now = new Date();
            document.getElementById('digital-clock').innerText = now.toLocaleTimeString();
        }
        setInterval(updateClock, 1000);
        updateClock();

        async function typePrint(text, className = "", speed = 20) {
            const line = document.createElement('div');
            if (className) line.className = className;
            output.appendChild(line);
            for (let i = 0; i < text.length; i++) {
                line.innerHTML += text.charAt(i);
                output.scrollTop = output.scrollHeight;
                await new Promise(res => setTimeout(res, speed));
            }
        }

        async function bootSequence() {
            input.disabled = true;
            await typePrint(">> FBI CORE V4.2 INITIALIZING...", "system");
            await typePrint(">> SESSION STARTING...", "system");
            await typePrint("ATTENTION: DO NOT TYPE ANY SENSITIVE INFORMATION IN THIS TERMINAL, AS IT COULD BE LOGGED SOMEWHERE, YOU JUST NEVER KNOW!!.");
            await typePrint("WELCOME AGENT. TYPE 'HELP' FOR COMMANDS.");
            input.disabled = false;
            input.focus();
        }

        input.addEventListener('keydown', async function (e) {
            if (e.key === 'Enter') {
                const rawCmd = input.value;
                if (rawCmd.trim() !== "") {
                    cmdHistory.push(rawCmd);
                    historyIndex = cmdHistory.length;
                }
                input.value = '';
                await processCommand(rawCmd);
            } 
            else if (e.key === 'ArrowUp') {
                if (historyIndex > 0) {
                    historyIndex--;
                    input.value = cmdHistory[historyIndex];
                }
                e.preventDefault();
            } 
            else if (e.key === 'ArrowDown') {
                if (historyIndex < cmdHistory.length - 1) {
                    historyIndex++;
                    input.value = cmdHistory[historyIndex];
                } else {
                    historyIndex = cmdHistory.length;
                    input.value = "";
                }
                e.preventDefault();
            }
        });

        async function processCommand(rawCmd) {
            const fullCmd = rawCmd.trim();
            const args = fullCmd.split(' ');
            const cmd = args[0].toLowerCase();

            if (isWaitingForPassword) {
                if (fullCmd === SECRET_KEY) {
                    isAdmin = true;
                    isWaitingForPassword = false;
                    promptSpan.innerText = "ROOT@FBI:#";
                    promptSpan.className = "admin";
                    threatLevel.innerText = "LEVEL: UNRESTRICTED (ROOT)";
                    threatLevel.classList.add('blinking');
                    await typePrint("ACCESS GRANTED. LEVEL 4 INTEL TOOLS UNLOCKED.", "admin");
                } else {
                    isWaitingForPassword = false;
                    await typePrint("AUTH_ERROR: UNAUTHORIZED ACCESS ATTEMPT LOGGED.", "error");
                }
                return;
            }

            const line = document.createElement('div');
            line.innerText = (isAdmin ? "ROOT@FBI:# " : "AGENT@FBI:~$ ") + fullCmd;
            output.appendChild(line);

            switch(cmd) {
                case 'help':
                    await typePrint("GENERAL: ls, cat [file], clear, login, status, connect tscpp main");
                    if (isAdmin) {
                        await typePrint("ROOT TOOLS: write [file] [text], download [file], intercept, locate [target], logout", "admin");
                    }
                    break;

                case 'connect':
                    if (args[1] === 'tscpp' && args[2] === 'main') {
                        await typePrint("INITIALIZING SECURE UPLINK TO TSCPP_MAIN...", "system");
                        await new Promise(res => setTimeout(res, 1000));
                        window.open("https://github.io", "_blank");
                        await typePrint("UPLINK ESTABLISHED. HANDSHAKE SENT.", "admin");
                    } else {
                        await typePrint("USAGE: connect tscpp main", "error");
                    }
                    break;

                case 'ls':
                    await typePrint(Object.keys(files).join("   ") || "No files found.");
                    break;

                case 'cat':
                    if (files[args[1]]) await typePrint(files[args[1]]);
                    else await typePrint("ERR: FILE NOT FOUND", "error");
                    break;

                case 'login':
                    if (isAdmin) await typePrint("Already logged in as ROOT.");
                    else {
                        await typePrint("ENTER ADMINISTRATIVE KEY:");
                        isWaitingForPassword = true;
                    }
                    break;

                case 'logout':
                    isAdmin = false;
                    promptSpan.innerText = "AGENT@FBI:~$";
                    promptSpan.className = "";
                    threatLevel.innerText = "LEVEL: RESTRICTED";
                    threatLevel.classList.remove('blinking');
                    await typePrint("SESSION RESET. PRIVILEGES REVOKED.");
                    break;

                case 'clear':
                    output.innerHTML = '';
                    break;

                case 'status':
                    await typePrint("CPU: 1.2% | NETWORK: ENCRYPTED | AUTH: " + (isAdmin ? "ROOT" : "AGENT"));
                    break;

                case 'write':
                    if (!isAdmin) {
                        await typePrint("PERM_ERR: ROOT ACCESS REQUIRED", "error");
                    } else if (args.length < 3) {
                        await typePrint("USAGE: write [filename] [content]", "error");
                    } else {
                        const filename = args[1];
                        const content = args.slice(2).join(' ');
                        files[filename] = content;
                        saveFiles();
                        await typePrint(`DATA ENCRYPTED. FILE '${filename}' SAVED.`, "admin");
                    }
                    break;

                case 'locate':
                    if (!isAdmin) {
                        await typePrint("PERM_ERR: ROOT ACCESS REQUIRED", "error");
                    } else {
                        const target = args[1] || "UNKNOWN_SIGNAL";
                        await typePrint(`TRIANGULATING SIGNAL FOR: ${target.toUpperCase()}...`, "system");
                        await new Promise(r => setTimeout(r, 1500));
                        const locs = ["Langley, VA", "Moscow, RU", "Berlin, DE", "Beijing, CN"];
                        const found = locs[Math.floor(Math.random() * locs.length)];
                        await typePrint(`SIGNAL ACQUIRED: ${found}`, "admin");
                        await typePrint(`COORDS: ${(Math.random()*180-90).toFixed(4)}, ${(Math.random()*360-180).toFixed(4)}`, "admin");
                    }
                    break;

                case 'intercept':
                    if (!isAdmin) {
                        await typePrint("PERM_ERR: ROOT ACCESS REQUIRED", "error");
                    } else {
                        await typePrint("SNIFFING LOCAL PACKETS...", "system");
                        await new Promise(r => setTimeout(r, 1500));
                        const users = ["User#7721", "Shadow_Admin", "Glitch_Tech"];
                        await typePrint(`INTERCEPTED: ${users[Math.floor(Math.random()*users.length)]} -> [DATA STREAM]`, "admin");
                    }
                    break;

                case 'download':
                    if (!isAdmin) {
                        await typePrint("PERM_ERR: ROOT ACCESS REQUIRED", "error");
                    } else if (!files[args[1]]) {
                        await typePrint("ERR: FILE NOT FOUND", "error");
                    } else {
                        const blob = new Blob([files[args[1]]], { type: 'text/plain' });
                        const url = window.URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = args[1];
                        a.click();
                        await typePrint("SUCCESS: FILE EXPORTED.", "system");
                    }
                    break;

                default:
                    if(cmd !== "") await typePrint("ERR: COMMAND NOT RECOGNIZED.", "error");
            }
        }
    </script>
</body>
</html>
